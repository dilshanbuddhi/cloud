# Shared defaults served by Config Server
# Bind to all interfaces so VM external IP works (e.g. 35.194.27.132). GCP firewall must allow ports.
server:
  address: 0.0.0.0

spring:
  jackson:
    time-zone: UTC

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

# Local / default: if EUREKA_URL unset, use loopback. Prod: SPRING_PROFILES_ACTIVE=prod + application-prod.yml (real IP only).
eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 10
