# Shared defaults served by Config Server
# Bind to all interfaces so VM external IP works (e.g. 35.194.27.132). GCP firewall must allow ports.
server:
  address: 0.0.0.0

spring:
  jackson:
    time-zone: UTC

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

# Eureka: set EUREKA_URL on GCP, e.g. http://<vm-external-ip>:8761/eureka (see docs/GCP-MICROSERVICES-DEPLOYMENT.md)
eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://34.55.203.126:8761/eureka}
    # Clients poll registry; Eureka server overrides fetch in eureka-server.yml
    registry-fetch-interval-seconds: 10
