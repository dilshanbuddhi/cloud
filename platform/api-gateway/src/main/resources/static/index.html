<body class="min-h-screen bg-slate-50 font-sans text-slate-800">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ═══ Toast (react-hot-toast compatible) ═══
let _listeners = [];
let _toasts = [];
let _tid = 0;
function _notify() { _listeners.forEach(fn => fn([..._toasts])); }
function _add(message, type, duration) {
  const id = String(++_tid);
  _toasts = [{ id, message, type }, ..._toasts];
  _notify();
  if (duration !== Infinity) setTimeout(() => _dismiss(id), duration);
  return id;
}
function _dismiss(id) {
  _toasts = _toasts.filter(t => t.id !== id);
  _notify();
}
const toast = {
  success: (msg, opts) => _add(msg, 'success', opts?.duration ?? 3000),
  error:   (msg, opts) => _add(msg, 'error',   opts?.duration ?? 4000),
  loading: (msg)       => _add(msg, 'loading',  Infinity),
  dismiss: (id)        => _dismiss(id),
};
function useToastStore() {
  const [list, setList] = useState(_toasts);
  useEffect(() => {
    _listeners.push(setList);
    return () => { _listeners = _listeners.filter(f => f !== setList); };
  }, []);
  return list;
}
function Toaster() {
  const list = useToastStore();
  return (
    <div className="pointer-events-none fixed right-4 top-4 z-[9999] flex max-w-[calc(100vw-2rem)] flex-col gap-2 sm:right-6 sm:top-6">
      {list.map(t => (
        <div
          key={t.id}
          className={
            'pointer-events-auto flex min-w-[240px] max-w-sm animate-toast-in items-center gap-3 rounded-2xl border px-4 py-3 text-sm font-semibold shadow-card backdrop-blur-md ' +
            (t.type === 'success'
              ? 'border-emerald-200/80 bg-emerald-50/95 text-emerald-900'
              : t.type === 'error'
              ? 'border-red-200/80 bg-red-50/95 text-red-900'
              : 'border-blue-200/80 bg-blue-50/95 text-blue-900')
          }
        >
          {t.type === 'success' && <span className="text-lg leading-none">✅</span>}
          {t.type === 'error' && <span className="text-lg leading-none">❌</span>}
          {t.type === 'loading' && <span className="inline-block size-4 shrink-0 animate-spin rounded-full border-2 border-blue-600 border-t-transparent" />}
          <span className="min-w-0 flex-1">{t.message}</span>
          <button type="button" className="rounded-lg p-1 text-slate-400 transition hover:bg-black/5 hover:text-slate-600" onClick={() => _dismiss(t.id)} aria-label="Close">✕</button>
        </div>
      ))}
    </div>
  );
}

// ═══ API ═══
let _token = null;
async function api(path, opts = {}) {
  const headers = { ...opts.headers };
  if (_token) headers['Authorization'] = 'Bearer ' + _token;
  if (opts.body && !(opts.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch(path, { ...opts, headers });
  if (res.status === 204) return null;
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || data.error || `HTTP ${res.status}`);
  return data;
}

/** Browser often gets 403 on private GCS; gateway → product-service proxies this path with ADC. */
function productImgSrc(p) {
  if (!p?.imageUrl) return null;
  const u = p.imageUrl;
  if (u.includes('storage.googleapis.com') || u.startsWith('/products/images/')) {
    return '/products/' + encodeURIComponent(p.id) + '/image/view';
  }
  return u;
}

// ═══ UI primitives ═══
const inputClass =
  'w-full rounded-xl border border-slate-200 bg-white px-3.5 py-2.5 text-sm text-slate-800 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10';

function Modal({ open, onClose, title, children, footer, wide }) {
  if (!open) return null;
  return (
    <div
      className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/45 p-4 backdrop-blur-sm"
      onClick={e => e.target === e.currentTarget && onClose()}
      role="presentation"
    >
      <div
        className={
          'animate-modal-in w-full max-h-[90vh] overflow-hidden rounded-2xl border border-slate-200/90 bg-white shadow-2xl ring-1 ring-slate-900/5 ' +
          (wide ? 'max-w-2xl' : 'max-w-md')
        }
        role="dialog"
        aria-modal="true"
      >
        <div className="flex items-start justify-between gap-4 border-b border-slate-100 px-6 pb-4 pt-5">
          <h3 className="text-lg font-extrabold tracking-tight text-slate-900">{title}</h3>
          <button type="button" className="rounded-lg p-1.5 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700" onClick={onClose}>✕</button>
        </div>
        <div className="max-h-[60vh] overflow-y-auto px-6 py-5">{children}</div>
        {footer && <div className="flex flex-wrap justify-end gap-2 border-t border-slate-100 bg-slate-50/80 px-6 py-4">{footer}</div>}
      </div>
    </div>
  );
}

function ConfirmModal({ open, onClose, onConfirm, message, danger }) {
  return (
    <Modal
      open={open}
      onClose={onClose}
      title="Confirm"
      footer={
        <>
          <button type="button" className="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-600 shadow-sm transition hover:bg-slate-50" onClick={onClose}>Cancel</button>
          <button
            type="button"
            className={
              'rounded-xl px-4 py-2 text-sm font-bold text-white shadow-md transition ' +
              (danger ? 'bg-gradient-to-b from-red-600 to-red-700 hover:from-red-500 hover:to-red-600' : 'bg-gradient-to-b from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600')
            }
            onClick={onConfirm}
          >
            Confirm
          </button>
        </>
      }
    >
      <p className="text-sm leading-relaxed text-slate-600">{message}</p>
    </Modal>
  );
}

function EmptyState({ icon, text }) {
  return (
    <div className="py-14 text-center">
      <div className="mb-2 text-4xl opacity-80">{icon}</div>
      <p className="text-sm font-medium text-slate-500">{text}</p>
    </div>
  );
}

function Field({ label, children }) {
  const child = React.Children.only(children);
  const merged = React.cloneElement(child, {
    className: [inputClass, child.props.className].filter(Boolean).join(' '),
  });
  return (
    <div className="mb-4">
      <label className="mb-1.5 block text-[11px] font-bold uppercase tracking-wider text-slate-500">{label}</label>
      {merged}
    </div>
  );
}

// ═══ Auth ═══
function AuthPage({ onSuccess }) {
  const [tab, setTab] = useState('login');
  const [form, setForm] = useState({ name: '', email: '', password: '' });
  const [busy, setBusy] = useState(false);
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  async function submit() {
    if (!form.email || !form.password) { toast.error('Fill all fields'); return; }
    if (tab === 'register' && !form.name) { toast.error('Name is required'); return; }
    setBusy(true);
    try {
      const data = tab === 'login'
        ? await api('/auth/login', { method: 'POST', body: { email: form.email, password: form.password } })
        : await api('/auth/register', { method: 'POST', body: { name: form.name, email: form.email, password: form.password } });
      const payload = JSON.parse(atob(data.token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      onSuccess({ token: data.token, id: parseInt(payload.sub), email: form.email });
      toast.success(tab === 'login' ? 'Welcome back!' : 'Account created!');
    } catch(e) { toast.error(e.message); }
    setBusy(false);
  }

  return (
    <div className="flex min-h-screen items-center justify-center bg-gradient-to-br from-blue-50 via-white to-slate-100 p-4">
      <div className="w-full max-w-md rounded-3xl border border-white/60 bg-white/90 p-9 shadow-glow backdrop-blur-xl sm:p-10">
        <div className="mb-1 text-4xl">🛒</div>
        <h1 className="text-2xl font-extrabold tracking-tight text-slate-900">Mini POS</h1>
        <p className="mb-6 text-sm text-slate-500">Cloud POS — products, orders &amp; checkout</p>
        <div className="mb-6 flex rounded-xl bg-slate-100/90 p-1">
          <button
            type="button"
            className={'flex-1 rounded-lg py-2.5 text-sm font-bold transition ' + (tab === 'login' ? 'bg-white text-blue-600 shadow-soft' : 'text-slate-500 hover:text-slate-800')}
            onClick={() => setTab('login')}
          >
            Sign In
          </button>
          <button
            type="button"
            className={'flex-1 rounded-lg py-2.5 text-sm font-bold transition ' + (tab === 'register' ? 'bg-white text-blue-600 shadow-soft' : 'text-slate-500 hover:text-slate-800')}
            onClick={() => setTab('register')}
          >
            Register
          </button>
        </div>
        {tab === 'register' && (
          <Field label="Full Name">
            <input value={form.name} onChange={set('name')} placeholder="John Doe" onKeyDown={e=>e.key==='Enter'&&submit()} />
          </Field>
        )}
        <Field label="Email">
          <input type="email" value={form.email} onChange={set('email')} placeholder="you@example.com" onKeyDown={e=>e.key==='Enter'&&submit()} />
        </Field>
        <Field label="Password">
          <input type="password" value={form.password} onChange={set('password')} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&submit()} />
        </Field>
        <button
          type="button"
          className="mt-2 w-full rounded-xl bg-gradient-to-b from-blue-600 to-blue-700 py-3 text-sm font-bold text-white shadow-lg shadow-blue-600/25 transition hover:from-blue-500 hover:to-blue-600 disabled:opacity-50"
          onClick={submit}
          disabled={busy}
        >
          {busy ? 'Please wait…' : tab === 'login' ? 'Sign In' : 'Create Account'}
        </button>
      </div>
    </div>
  );
}

// ═══ Dashboard ═══
function Dashboard({ products, orders }) {
  const revenue = useMemo(() => orders.reduce((s, o) => {
    const p = products.find(x => x.id === o.productId);
    return s + (p ? p.price * o.quantity : 0);
  }, 0), [orders, products]);
  const recent = useMemo(() =>
    [...orders].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 8),
  [orders]);
  function productName(pid) {
    const p = products.find(x => x.id === pid);
    return p ? p.name : pid?.substring(0,10) + '…';
  }

  return (
    <div>
      <div className="mb-6 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h2 className="text-2xl font-extrabold tracking-tight text-slate-900">Dashboard</h2>
          <p className="text-sm text-slate-500">Overview of your store</p>
        </div>
      </div>
      <div className="mb-6 grid gap-4 sm:grid-cols-3">
        <div className="rounded-2xl border border-slate-200/80 bg-white p-5 shadow-soft">
          <p className="text-[11px] font-bold uppercase tracking-wider text-slate-400">Products</p>
          <p className="mt-1 text-3xl font-extrabold text-blue-600">{products.length}</p>
        </div>
        <div className="rounded-2xl border border-slate-200/80 bg-white p-5 shadow-soft">
          <p className="text-[11px] font-bold uppercase tracking-wider text-slate-400">My orders</p>
          <p className="mt-1 text-3xl font-extrabold text-emerald-600">{orders.length}</p>
        </div>
        <div className="rounded-2xl border border-slate-200/80 bg-white p-5 shadow-soft">
          <p className="text-[11px] font-bold uppercase tracking-wider text-slate-400">Revenue (Rs.)</p>
          <p className="mt-1 text-3xl font-extrabold text-amber-600">{revenue.toFixed(2)}</p>
        </div>
      </div>
      <div className="overflow-hidden rounded-2xl border border-slate-200/80 bg-white shadow-soft">
        <div className="border-b border-slate-100 px-5 py-4">
          <h3 className="text-sm font-bold text-slate-800">Recent orders</h3>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full min-w-[640px] text-left text-sm">
            <thead>
              <tr className="border-b border-slate-100 bg-slate-50/80 text-[11px] font-bold uppercase tracking-wider text-slate-500">
                <th className="px-5 py-3">Order ID</th>
                <th className="px-5 py-3">Product</th>
                <th className="px-5 py-3">Qty</th>
                <th className="px-5 py-3">Date</th>
                <th className="px-5 py-3">Status</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {recent.length === 0 ? (
                <tr><td colSpan={5}><EmptyState icon="📋" text="No orders yet" /></td></tr>
              ) : recent.map(o => (
                <tr key={o.id} className="transition hover:bg-slate-50/80">
                  <td className="px-5 py-3 font-mono text-xs text-slate-500">{o.id?.substring(0,12)}…</td>
                  <td className="px-5 py-3 font-semibold text-slate-800">{productName(o.productId)}</td>
                  <td className="px-5 py-3"><span className="rounded-full bg-blue-100 px-2.5 py-0.5 text-xs font-bold text-blue-800">{o.quantity}</span></td>
                  <td className="px-5 py-3 text-slate-600">{new Date(o.createdAt).toLocaleString('en-LK',{dateStyle:'medium',timeStyle:'short'})}</td>
                  <td className="px-5 py-3"><span className="rounded-full bg-emerald-100 px-2.5 py-0.5 text-xs font-bold text-emerald-800">Completed</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ═══ POS ═══
function POSPage({ products, userId, onOrdersChange }) {
  const [q, setQ] = useState('');
  const [cart, setCart] = useState([]);
  const [busy, setBusy] = useState(false);
  const filtered = useMemo(() =>
    products.filter(p => p.name.toLowerCase().includes(q.toLowerCase())),
  [products, q]);

  function addItem(pid) {
    setCart(c => {
      const ex = c.find(x => x.productId === pid);
      if (ex) return c.map(x => x.productId===pid ? {...x,quantity:x.quantity+1} : x);
      return [...c, { productId: pid, quantity: 1 }];
    });
    toast.success('Added to cart');
  }
  function updateQty(pid, d) {
    setCart(c => {
      const updated = c.map(x => x.productId===pid ? {...x,quantity:x.quantity+d} : x);
      return updated.filter(x => x.quantity > 0);
    });
  }
  function removeItem(pid) { setCart(c => c.filter(x => x.productId !== pid)); }
  const total = useMemo(() => cart.reduce((s, c) => {
    const p = products.find(x => x.id === c.productId);
    return s + (p ? p.price * c.quantity : 0);
  }, 0), [cart, products]);

  async function checkout() {
    if (!cart.length) return;
    setBusy(true);
    const tid = toast.loading(`Placing ${cart.length} order(s)…`);
    try {
      for (const item of cart) {
        await api('/orders', { method:'POST', body:{ userId, productId:item.productId, quantity:item.quantity }});
      }
      toast.dismiss(tid);
      toast.success(`${cart.length} order(s) placed successfully!`);
      setCart([]);
      onOrdersChange();
    } catch(e) { toast.dismiss(tid); toast.error(e.message); }
    setBusy(false);
  }

  return (
    <div className="grid grid-cols-1 gap-6 xl:grid-cols-[1fr_20rem] xl:gap-8">
      <div>
        <div className="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h2 className="text-2xl font-extrabold tracking-tight text-slate-900">Point of sale</h2>
            <p className="text-sm text-slate-500">Tap a product to add to cart</p>
          </div>
        </div>
        <input
          className={inputClass + ' mb-4'}
          placeholder="Search products…"
          value={q}
          onChange={e=>setQ(e.target.value)}
        />
        {filtered.length === 0 ? (
          <EmptyState icon="🔍" text="No products found" />
        ) : (
          <div className="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-4">
            {filtered.map(p => (
              <button
                type="button"
                key={p.id}
                className="group overflow-hidden rounded-2xl border border-slate-200/90 bg-white text-left shadow-soft transition hover:-translate-y-0.5 hover:border-blue-300 hover:shadow-card active:scale-[0.98]"
                onClick={() => addItem(p.id)}
              >
                <div className="flex h-24 items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100 text-3xl text-slate-300 group-hover:from-blue-50 group-hover:to-indigo-50">
                  {p.imageUrl ? (
                    <img src={productImgSrc(p)} alt={p.name} className="h-full w-full object-cover" />
                  ) : '📦'}
                </div>
                <div className="p-3">
                  <div className="truncate text-sm font-bold text-slate-900">{p.name}</div>
                  <div className="text-sm font-extrabold text-emerald-600">Rs. {p.price.toFixed(2)}</div>
                </div>
              </button>
            ))}
          </div>
        )}
      </div>

      <div className="flex max-h-none flex-col overflow-hidden rounded-2xl border border-slate-200/90 bg-white shadow-card xl:sticky xl:top-20 xl:max-h-[calc(100vh-5.5rem)]">
        <div className="flex items-center justify-between border-b border-slate-100 px-4 py-3">
          <h3 className="flex items-center gap-2 text-base font-extrabold text-slate-900">
            Cart
            {cart.length > 0 && <span className="rounded-full bg-blue-100 px-2 py-0.5 text-xs font-bold text-blue-800">{cart.length}</span>}
          </h3>
          {cart.length > 0 && (
            <button type="button" className="text-xs font-bold text-slate-500 underline-offset-2 hover:text-red-600 hover:underline" onClick={() => setCart([])}>Clear</button>
          )}
        </div>
        <div className="min-h-[200px] flex-1 overflow-y-auto">
          {cart.length === 0 ? (
            <EmptyState icon="🛒" text="Tap a product to add" />
          ) : cart.map(c => {
            const p = products.find(x => x.id === c.productId);
            if (!p) return null;
            return (
              <div key={c.productId} className="flex items-center gap-3 border-b border-slate-50 px-4 py-3">
                <div className="min-w-0 flex-1">
                  <div className="truncate text-sm font-bold text-slate-900">{p.name}</div>
                  <div className="text-xs text-slate-500">
                    Rs. {p.price.toFixed(2)} × {c.quantity} = <strong className="text-slate-800">Rs. {(p.price*c.quantity).toFixed(2)}</strong>
                  </div>
                </div>
                <div className="flex shrink-0 items-center gap-1">
                  <button type="button" className="flex size-8 items-center justify-center rounded-lg border border-slate-200 bg-slate-50 text-sm font-bold transition hover:border-blue-500 hover:bg-blue-600 hover:text-white" onClick={() => updateQty(c.productId,-1)}>−</button>
                  <span className="w-6 text-center text-sm font-extrabold">{c.quantity}</span>
                  <button type="button" className="flex size-8 items-center justify-center rounded-lg border border-slate-200 bg-slate-50 text-sm font-bold transition hover:border-blue-500 hover:bg-blue-600 hover:text-white" onClick={() => updateQty(c.productId,1)}>+</button>
                  <button type="button" className="ml-1 flex size-8 items-center justify-center rounded-lg border border-red-200 text-red-600 transition hover:bg-red-50" onClick={() => removeItem(c.productId)}>✕</button>
                </div>
              </div>
            );
          })}
        </div>
        <div className="border-t-2 border-slate-100 bg-slate-50/80 p-4">
          <div className="mb-3 flex items-center justify-between">
            <span className="text-sm font-bold text-slate-700">Total</span>
            <span className="text-2xl font-extrabold text-emerald-600">Rs. {total.toFixed(2)}</span>
          </div>
          <button
            type="button"
            className="w-full rounded-xl bg-gradient-to-b from-emerald-600 to-emerald-700 py-3 text-sm font-bold text-white shadow-lg shadow-emerald-600/20 transition hover:from-emerald-500 hover:to-emerald-600 disabled:opacity-45"
            onClick={checkout}
            disabled={!cart.length || busy}
          >
            {busy ? '⏳ Placing…' : '✅ Checkout'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══ Products ═══
function ProductsPage({ products, onRefresh }) {
  const [q, setQ] = useState('');
  const [modal, setModal] = useState(null);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name:'', price:'' });
  const [imgFile, setImgFile] = useState(null);
  const [targetId, setTargetId] = useState(null);
  const [busy, setBusy] = useState(false);
  const imgRef = useRef();

  const filtered = useMemo(() =>
    products.filter(p => p.name.toLowerCase().includes(q.toLowerCase())),
  [products, q]);

  function openAdd() { setEditing(null); setForm({ name:'', price:'' }); setImgFile(null); setModal('add'); }
  function openEdit(p) { setEditing(p); setForm({ name:p.name, price:String(p.price) }); setModal('edit'); }
  function openImg(p) { setEditing(p); setImgFile(null); setModal('img'); }
  function openConfirm(id) { setTargetId(id); setModal('confirm'); }
  function closeModal() { setModal(null); setEditing(null); setTargetId(null); }

  async function saveProduct() {
    if (!form.name.trim()) { toast.error('Name is required'); return; }
    const price = parseFloat(form.price);
    if (!price || price <= 0) { toast.error('Enter a valid price'); return; }
    setBusy(true);
    const tid = toast.loading(editing ? 'Updating…' : 'Adding…');
    try {
      if (editing) {
        await api(`/products/${editing.id}`, { method:'PUT', body:{ name:form.name.trim(), price }});
        toast.dismiss(tid); toast.success('Product updated!');
      } else {
        const np = await api('/products', { method:'POST', body:{ name:form.name.trim(), price }});
        if (imgFile) {
          const fd = new FormData(); fd.append('file', imgFile);
          await api(`/products/${np.id}/image`, { method:'POST', body:fd });
        }
        toast.dismiss(tid); toast.success('Product added!');
      }
      closeModal(); onRefresh();
    } catch(e) { toast.dismiss(tid); toast.error(e.message); }
    setBusy(false);
  }

  async function uploadImg() {
    if (!imgFile) { toast.error('Select an image file'); return; }
    setBusy(true);
    const tid = toast.loading('Uploading…');
    try {
      const fd = new FormData(); fd.append('file', imgFile);
      await api(`/products/${editing.id}/image`, { method:'POST', body:fd });
      toast.dismiss(tid); toast.success('Image uploaded to GCS!');
      closeModal(); onRefresh();
    } catch(e) { toast.dismiss(tid); toast.error(e.message); }
    setBusy(false);
  }

  async function deleteProduct() {
    setBusy(true);
    const tid = toast.loading('Deleting…');
    try {
      await api(`/products/${targetId}`, { method:'DELETE' });
      toast.dismiss(tid); toast.success('Product deleted');
      closeModal(); onRefresh();
    } catch(e) { toast.dismiss(tid); toast.error(e.message); }
    setBusy(false);
  }

  const formModal = (
    <Modal
      open={modal==='add'||modal==='edit'}
      onClose={closeModal}
      title={modal==='edit' ? '✏️ Edit product' : '➕ Add product'}
      footer={
        <>
          <button type="button" className="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-600 shadow-sm hover:bg-slate-50" onClick={closeModal}>Cancel</button>
          <button type="button" className="rounded-xl bg-gradient-to-b from-blue-600 to-blue-700 px-4 py-2 text-sm font-bold text-white shadow-md hover:from-blue-500 hover:to-blue-600 disabled:opacity-50" onClick={saveProduct} disabled={busy}>
            {busy ? 'Saving…' : modal==='edit' ? 'Update' : 'Add product'}
          </button>
        </>
      }
    >
      <Field label="Product name">
        <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Coca Cola 500ml" />
      </Field>
      <Field label="Price (Rs.)">
        <input type="number" min="0.01" step="0.01" value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))} placeholder="250.00" />
      </Field>
      {modal==='add' && (
        <Field label="Image (optional)">
          <input ref={imgRef} type="file" accept="image/*" className={inputClass + ' cursor-pointer file:mr-3 file:rounded-lg file:border-0 file:bg-blue-50 file:px-3 file:py-1.5 file:text-xs file:font-bold file:text-blue-700'} onChange={e=>setImgFile(e.target.files[0])} />
        </Field>
      )}
    </Modal>
  );

  const imgModal = (
    <Modal
      open={modal==='img'}
      onClose={closeModal}
      title="📷 Upload to GCS"
      footer={
        <>
          <button type="button" className="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-600 shadow-sm hover:bg-slate-50" onClick={closeModal}>Cancel</button>
          <button type="button" className="rounded-xl bg-gradient-to-b from-blue-600 to-blue-700 px-4 py-2 text-sm font-bold text-white shadow-md hover:from-blue-500 hover:to-blue-600 disabled:opacity-50" onClick={uploadImg} disabled={busy||!imgFile}>
            {busy ? 'Uploading…' : 'Upload'}
          </button>
        </>
      }
    >
      {editing && <p className="mb-4 text-sm text-slate-600">Product: <strong className="text-slate-900">{editing.name}</strong></p>}
      <Field label="Select image">
        <input type="file" accept="image/*" className={inputClass + ' cursor-pointer file:mr-3 file:rounded-lg file:border-0 file:bg-blue-50 file:px-3 file:py-1.5 file:text-xs file:font-bold file:text-blue-700'} onChange={e=>setImgFile(e.target.files[0])} />
      </Field>
      {editing?.imageUrl && (
        <div className="mt-2">
          <p className="mb-2 text-xs font-semibold text-slate-500">Current</p>
          <img src={productImgSrc(editing)} alt="current" className="max-h-40 w-full rounded-xl border border-slate-200 object-cover" />
        </div>
      )}
    </Modal>
  );

  return (
    <div>
      <div className="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <h2 className="text-2xl font-extrabold tracking-tight text-slate-900">Products</h2>
        <button type="button" className="rounded-xl bg-gradient-to-b from-blue-600 to-blue-700 px-4 py-2.5 text-sm font-bold text-white shadow-lg shadow-blue-600/20 hover:from-blue-500 hover:to-blue-600" onClick={openAdd}>+ Add product</button>
      </div>
      <input className={inputClass + ' mb-5'} placeholder="Search products…" value={q} onChange={e=>setQ(e.target.value)} />

      {filtered.length === 0 ? (
        <EmptyState icon="📦" text="No products yet. Add one!" />
      ) : (
        <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
          {filtered.map(p => (
            <div key={p.id} className="overflow-hidden rounded-2xl border border-slate-200/90 bg-white shadow-soft transition hover:shadow-card">
              <div className="flex h-32 items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100 text-4xl text-slate-300">
                {p.imageUrl ? <img src={productImgSrc(p)} alt={p.name} className="h-full w-full object-cover" /> : '📦'}
              </div>
              <div className="p-4">
                <div className="truncate font-bold text-slate-900" title={p.name}>{p.name}</div>
                <div className="mb-3 text-lg font-extrabold text-emerald-600">Rs. {p.price.toFixed(2)}</div>
                <div className="flex flex-wrap gap-2">
                  <button type="button" className="rounded-lg border border-slate-200 bg-slate-50 px-2.5 py-1.5 text-xs font-bold text-slate-600 hover:bg-slate-100" onClick={()=>openImg(p)} title="Upload">📷</button>
                  <button type="button" className="rounded-lg bg-blue-600 px-2.5 py-1.5 text-xs font-bold text-white hover:bg-blue-700" onClick={()=>openEdit(p)}>✏️ Edit</button>
                  <button type="button" className="rounded-lg bg-red-600 px-2.5 py-1.5 text-xs font-bold text-white hover:bg-red-700" onClick={()=>openConfirm(p.id)}>🗑️ Delete</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {formModal}
      {imgModal}
      <ConfirmModal open={modal==='confirm'} onClose={closeModal} onConfirm={deleteProduct} message="Delete this product? This cannot be undone." danger />
    </div>
  );
}

// ═══ Orders ═══
function OrdersPage({ orders, products, onRefresh }) {
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(null);
  const [deleteId, setDeleteId] = useState(null);
  const [busy, setBusy] = useState(false);

  function productName(pid) {
    const p = products.find(x => x.id === pid);
    return p ? p.name : pid?.substring(0,14)+'…';
  }
  function productPrice(pid) {
    const p = products.find(x => x.id === pid);
    return p ? p.price : 0;
  }
  function openView(o) { setSelected(o); setModal('view'); }
  function openConfirm(id) { setDeleteId(id); setModal('confirm'); }
  function closeModal() { setModal(null); setSelected(null); setDeleteId(null); }

  async function deleteOrder() {
    setBusy(true);
    const tid = toast.loading('Deleting order…');
    try {
      await api(`/orders/${deleteId}`, { method:'DELETE' });
      toast.dismiss(tid); toast.success('Order deleted');
      closeModal(); onRefresh();
    } catch(e) { toast.dismiss(tid); toast.error(e.message); }
    setBusy(false);
  }

  const sorted = useMemo(() =>
    [...orders].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)),
  [orders]);

  return (
    <div>
      <div className="mb-6">
        <h2 className="text-2xl font-extrabold tracking-tight text-slate-900">Orders</h2>
        <p className="text-sm text-slate-500">Your order history</p>
      </div>
      <div className="overflow-hidden rounded-2xl border border-slate-200/80 bg-white shadow-soft">
        <div className="overflow-x-auto">
          {sorted.length === 0 ? (
            <EmptyState icon="📋" text="No orders yet" />
          ) : (
            <table className="w-full min-w-[720px] text-left text-sm">
              <thead>
                <tr className="border-b border-slate-100 bg-slate-50/80 text-[11px] font-bold uppercase tracking-wider text-slate-500">
                  <th className="px-5 py-3">Order ID</th>
                  <th className="px-5 py-3">Product</th>
                  <th className="px-5 py-3">Qty</th>
                  <th className="px-5 py-3">Total</th>
                  <th className="px-5 py-3">Date</th>
                  <th className="px-5 py-3">Actions</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {sorted.map(o => (
                  <tr key={o.id} className="transition hover:bg-slate-50/80">
                    <td className="px-5 py-3 font-mono text-xs text-slate-500">{o.id?.substring(0,12)}…</td>
                    <td className="px-5 py-3 font-semibold text-slate-800">{productName(o.productId)}</td>
                    <td className="px-5 py-3"><span className="rounded-full bg-blue-100 px-2.5 py-0.5 text-xs font-bold text-blue-800">{o.quantity}</span></td>
                    <td className="px-5 py-3 font-bold text-emerald-600">Rs. {(productPrice(o.productId)*o.quantity).toFixed(2)}</td>
                    <td className="px-5 py-3 text-xs text-slate-600">{new Date(o.createdAt).toLocaleString('en-LK',{dateStyle:'medium',timeStyle:'short'})}</td>
                    <td className="px-5 py-3">
                      <div className="flex flex-wrap gap-2">
                        <button type="button" className="rounded-lg border border-slate-200 bg-white px-2.5 py-1 text-xs font-bold text-slate-600 shadow-sm hover:bg-slate-50" onClick={()=>openView(o)}>View</button>
                        <button type="button" className="rounded-lg bg-red-600 px-2.5 py-1 text-xs font-bold text-white hover:bg-red-700" onClick={()=>openConfirm(o.id)}>Delete</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>

      <Modal
        open={modal==='view'}
        onClose={closeModal}
        title="📄 Order details"
        footer={<button type="button" className="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-600 shadow-sm hover:bg-slate-50" onClick={closeModal}>Close</button>}
      >
        {selected && (() => {
          const price = productPrice(selected.productId);
          return (
            <div className="space-y-0 divide-y divide-slate-100 text-sm">
              <div className="flex justify-between gap-4 py-3"><span className="font-semibold text-slate-500">Order ID</span><span className="max-w-[55%] break-all text-right font-mono text-xs font-bold text-slate-800">{selected.id}</span></div>
              <div className="flex justify-between gap-4 py-3"><span className="font-semibold text-slate-500">Product</span><span className="max-w-[55%] text-right font-bold text-slate-900">{productName(selected.productId)}</span></div>
              <div className="flex justify-between gap-4 py-3"><span className="font-semibold text-slate-500">Unit price</span><span className="text-right font-bold">Rs. {price.toFixed(2)}</span></div>
              <div className="flex justify-between gap-4 py-3"><span className="font-semibold text-slate-500">Quantity</span><span className="text-right"><span className="rounded-full bg-blue-100 px-2.5 py-0.5 text-xs font-bold text-blue-800">{selected.quantity}</span></span></div>
              <div className="flex justify-between gap-4 py-3"><span className="font-semibold text-slate-500">Total</span><span className="text-right text-lg font-extrabold text-emerald-600">Rs. {(price*selected.quantity).toFixed(2)}</span></div>
              <div className="flex justify-between gap-4 py-3"><span className="font-semibold text-slate-500">Date</span><span className="max-w-[55%] text-right text-xs text-slate-700">{new Date(selected.createdAt).toLocaleString('en-LK',{dateStyle:'long',timeStyle:'medium'})}</span></div>
              <div className="flex justify-between gap-4 py-3"><span className="font-semibold text-slate-500">Status</span><span className="text-right"><span className="rounded-full bg-emerald-100 px-2.5 py-0.5 text-xs font-bold text-emerald-800">Completed</span></span></div>
            </div>
          );
        })()}
      </Modal>

      <ConfirmModal open={modal==='confirm'} onClose={closeModal} onConfirm={deleteOrder} message="Delete this order permanently?" danger />
    </div>
  );
}

// ═══ Layout ═══
const NAV = [
  { id:'dashboard', icon:'📊', label:'Dashboard' },
  { id:'pos',       icon:'🛍️', label:'POS' },
  { id:'products',  icon:'📦', label:'Products' },
  { id:'orders',    icon:'📋', label:'Orders' },
];

function AppLayout({ page, onNav, user, onLogout, children }) {
  return (
    <div className="flex min-h-screen flex-col bg-slate-50">
      <header className="sticky top-0 z-50 flex h-14 shrink-0 items-center justify-between border-b border-slate-200/80 bg-white/85 px-4 shadow-sm backdrop-blur-md sm:px-6">
        <div className="flex items-center gap-2 text-lg font-extrabold tracking-tight text-blue-600">
          <span className="text-xl">🛒</span> Mini POS
        </div>
        <div className="flex items-center gap-2 sm:gap-3">
          <span className="hidden max-w-[140px] truncate rounded-full bg-blue-50 px-3 py-1 text-xs font-bold text-blue-700 sm:inline sm:max-w-[220px]">👤 {user.email}</span>
          <button type="button" className="rounded-xl border border-slate-200 bg-white px-3 py-2 text-xs font-bold text-slate-600 shadow-sm transition hover:bg-slate-50 sm:px-4 sm:text-sm" onClick={onLogout}>Logout</button>
        </div>
      </header>
      <div className="flex flex-1 flex-col md:flex-row md:overflow-hidden">
        <nav className="flex shrink-0 gap-1 overflow-x-auto border-b border-slate-200 bg-white px-2 py-2 md:w-56 md:flex-col md:border-b-0 md:border-r md:border-slate-200 md:bg-slate-50/90 md:p-3 md:py-4">
          {NAV.map(n => (
            <button
              key={n.id}
              type="button"
              className={
                'flex shrink-0 items-center gap-2.5 rounded-xl px-3.5 py-2.5 text-left text-sm font-bold transition md:w-full ' +
                (page === n.id
                  ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-md shadow-blue-600/25'
                  : 'text-slate-600 hover:bg-white hover:text-slate-900 md:hover:bg-white')
              }
              onClick={() => onNav(n.id)}
            >
              <span className="text-base">{n.icon}</span>
              {n.label}
            </button>
          ))}
        </nav>
        <main className="min-h-0 flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">{children}</main>
      </div>
    </div>
  );
}

// ═══ App ═══
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [products, setProducts] = useState([]);
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const token = localStorage.getItem('pos_token');
    const email = localStorage.getItem('pos_email');
    const id    = localStorage.getItem('pos_uid');
    if (token && email && id) {
      _token = token;
      setUser({ token, id: parseInt(id), email });
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    if (user) { fetchProducts(); fetchOrders(); }
  }, [user]);

  async function fetchProducts() {
    try { setProducts(await api('/products') || []); }
    catch(e) { toast.error('Failed to load products: ' + e.message); }
  }
  async function fetchOrders() {
    if (!user) return;
    try { setOrders(await api(`/orders?userId=${user.id}`) || []); }
    catch(e) { toast.error('Failed to load orders: ' + e.message); }
  }

  function handleLogin({ token, id, email }) {
    _token = token;
    localStorage.setItem('pos_token', token);
    localStorage.setItem('pos_email', email);
    localStorage.setItem('pos_uid', String(id));
    setUser({ token, id, email });
  }
  function handleLogout() {
    _token = null;
    localStorage.clear();
    setUser(null);
    setProducts([]);
    setOrders([]);
    setPage('dashboard');
  }

  if (loading) return <div className="flex min-h-screen items-center justify-center bg-slate-50 text-sm font-semibold text-slate-500">Loading…</div>;
  if (!user) return <AuthPage onSuccess={handleLogin} />;

  return (
    <AppLayout page={page} onNav={setPage} user={user} onLogout={handleLogout}>
      {page === 'dashboard' && <Dashboard products={products} orders={orders} />}
      {page === 'pos' && <POSPage products={products} userId={user.id} onOrdersChange={fetchOrders} />}
      {page === 'products' && <ProductsPage products={products} onRefresh={fetchProducts} />}
      {page === 'orders' && <OrdersPage orders={orders} products={products} onRefresh={fetchOrders} />}
    </AppLayout>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <>
    <App />
    <Toaster />
  </>
);
</script>
</body>
